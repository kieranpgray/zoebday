<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Record player front view</title>
  <desc id="desc">A stylized wooden record player with platter and tonearm.</desc>
  <defs>
    <linearGradient id="wood" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8d6749" />
      <stop offset="100%" stop-color="#5f3f2b" />
    </linearGradient>
    <linearGradient id="metal" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#cfd3d6" />
      <stop offset="100%" stop-color="#8b9298" />
    </linearGradient>
    <radialGradient id="vinyl" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#3a3a3a" />
      <stop offset="70%" stop-color="#1f1f1f" />
      <stop offset="100%" stop-color="#0f0f0f" />
    </radialGradient>
  </defs>

  <rect x="80" y="120" width="1040" height="560" rx="26" fill="url(#wood)" />
  <rect x="130" y="170" width="940" height="460" rx="18" fill="#181818" />

  <circle cx="520" cy="400" r="190" fill="url(#vinyl)" />
  <circle cx="520" cy="400" r="140" fill="none" stroke="#2a2a2a" stroke-width="2" />
  <circle cx="520" cy="400" r="95" fill="none" stroke="#303030" stroke-width="2" />
  <circle cx="520" cy="400" r="30" fill="#c6a66c" />
  <circle cx="520" cy="400" r="8" fill="#111" />

  <rect x="780" y="295" width="220" height="22" rx="11" fill="url(#metal)" transform="rotate(18 780 295)" />
  <circle cx="820" cy="332" r="22" fill="#9ea5ab" />
  <rect x="926" y="347" width="72" height="12" rx="6" fill="#cfd3d6" transform="rotate(18 926 347)" />

  <circle cx="965" cy="490" r="13" fill="#9f9f9f" />
  <circle cx="1010" cy="490" r="13" fill="#9f9f9f" />
  <circle cx="1055" cy="490" r="13" fill="#9f9f9f" />

  <rect x="190" y="520" width="120" height="18" rx="9" fill="#2f2f2f" />
  <rect x="340" y="520" width="120" height="18" rx="9" fill="#2f2f2f" />
</svg>
